image: archlinux
packages:
  - go
  - golangci-lint
sources:
  - https://github.com/go-ap/jsonld
environment:
  GO111MODULE: 'on'
tasks:
  - setup: |
      cd jsonld
      go mod download
  - fmt: |
      cd jsonld
      test -z $(gofmt -l .)
  - tests: |
      cd jsonld
      make test
  - coverage: |
      set -a +x
      cd jsonld
      git switch -C master origin/master
      make coverage
      #go run github.com/mattn/goveralls@latest -flagname unit-tests -service=${CI_NAME} -coverprofile jsonld.coverprofile -repotokenfile ~/.coveralls.tok
  - lint: |
      cd jsonld
      golangci-lint run || true
